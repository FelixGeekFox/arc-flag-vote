<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" role="img" aria-labelledby="title desc">
  <title id="title">Overlap symbol</title>
  <desc id="desc">Two overlapping circles with a shared centre mark.</desc>
  <rect width="1200" height="1200" fill="none"/>
  <circle cx="500" cy="600" r="250" fill="#D8B55B"/>
  <circle cx="700" cy="600" r="250" fill="#1B2A41"/>
  <path d="M600 370.9A250 250 0 0 1 700 600a250 250 0 0 1-100 229.1A250 250 0 0 1 500 600a250 250 0 0 1 100-229.1Z" fill="#FAF8F3"/>
  <circle cx="500" cy="600" r="250" fill="none" stroke="#FAF8F3" stroke-width="24"/>
  <circle cx="700" cy="600" r="250" fill="none" stroke="#FAF8F3" stroke-width="24"/>
  <circle cx="600" cy="600" r="44" fill="#E86BA2" stroke="#1B2A41" stroke-width="12"/>
</svg>
